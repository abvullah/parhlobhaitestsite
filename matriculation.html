<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Matriculation – parhlobhai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="topbar">
        <div class="container">
            <span><b>parhlobhai&nbsp;&nbsp;</b></span>
            <button class="dark-toggle" id="darkToggleBtn" onclick="toggleDarkMode()">🌙 Dark</button>
        </div>
    </div>

    <div class="navbar">
        <div class="container">
            <a href="index.html">Home</a>
            <a href="o-levels.html">O Levels</a>
            <a href="igcse.html">IGCSE</a>
            <a href="a-levels.html">A Levels</a>
            <a href="matriculation.html">Matriculation</a>
            <a href="intermediate.html">Intermediate</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="container">

        <div class="title-block">
            <h1>Matriculation</h1>
            <div class="sub">Federal & provincial board resources for Matric Science and Arts students.</div>
        </div>

        <div class="dropdown-container">
            <label for="subjectSelect" class="dropdown-label">Select a subject:</label>
            <select id="subjectSelect" class="native-select">
                <option value="mathematics">📐 Mathematics</option>
                <option value="physics">⚡ Physics</option>
                <option value="chemistry">🧪 Chemistry</option>
                <option value="biology">🔬 Biology</option>
                <option value="computer-science">💻 Computer Science</option>
                <option value="urdu">📝 Urdu</option>
                <option value="islamiyat">🕌 Islamiyat</option>
                <option value="thq">📖 Tarjama ul Quran</option>
            </select>
        </div>

        <div id="resourcesContainer"></div>

        <hr class="hr-90s">

        <div class="footer">
            &copy; 2026 parhlobhai &nbsp;|&nbsp; <a href="about.html">About</a> &nbsp;|&nbsp; <a href="contact.html">Contact</a>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        const subjects = {
            "mathematics": {
                name: "📐 Mathematics",
                resources: [
                    { tag: "[PDF]", title: "Matric Math Model Paper – Federal Board", desc: "9th grade model paper for Matric Math from the Federal Board.", url: "https://drive.google.com/file/d/1iDviYuFpZ99FuWdaNIW7Ht29XiT6gU-v/view?usp=drive_link" }
                ]
            },
            "physics": {
                name: "⚡ Physics",
                resources: [
                    { tag: "[PDF]", title: "Matric Physics Model Paper – Federal Board", desc: "9th grade model paper for Matric Physics from the Federal Board.", url: "https://drive.google.com/file/d/1xcv1hCgkKDhNekT65Er5Fe3mO97_Hzlt/view?usp=drive_link" },
                    { tag: "[FOLDER]", title: "Physics Practical Based Assessment - Federal Board", desc: "9th & 10th grade practical based assessment for Matric Physics from the Federal Board.", url: "https://drive.google.com/drive/folders/1oUEFZf0OdrVov5iAebTnqMKLM3QxasMQ?usp=drive_link" }
                ]
            },
            "chemistry": {
                name: "🧪 Chemistry",
                resources: [
                    { tag: "[PDF]", title: "Matric Chemistry Model Paper – Federal Board", desc: "9th grade model paper for Matric Chemistry from the Federal Board.", url: "https://drive.google.com/file/d/151QwCzAKDXJYIEtI8cE55kMfW9Yv76ac/view?usp=drive_link" },
                    { tag: "[FOLDER]", title: "Chemistry Practical Based Assessment - Federal Board", desc: "9th & 10th grade practical based assessment for Matric Chemistry from the Federal Board.", url: "https://drive.google.com/drive/folders/1AtZ5srBx7tZInDuups-6VYbh-fAX2MDU?usp=drive_link" }
                ]
            },
            "biology": {
                name: "🔬 Biology",
                resources: [
                    { tag: "[PDF]", title: "Matric Biology Model Paper – Federal Board", desc: "9th grade model paper for Matric Biology from the Federal Board.", url: "https://drive.google.com/file/d/1-flkWqCBnb06UXMYKIVsMKlDyd4Fk0wv/view?usp=drive_link" },
                    { tag: "[PDF]", title: "Biology Practical Based Assessment - Federal Board", desc: "9th & 10th grade practical based assessment for Matric Biology from the Federal Board.", url: "https://drive.google.com/file/d/1spez4_g-DBsanTFWACQCvmaJ1qb6sThI/view?usp=drive_link" }
                ]
            },
            "computer-science": {
                name: "💻 Computer Science",
                resources: [
                    { tag: "[PDF]", title: "Matric Computer Science Model Paper – Federal Board", desc: "9th grade model paper for Matric Computer Science from the Federal Board.", url: "https://drive.google.com/file/d/19o53d9UHHnBLJXXnDbuSvGfApEVWFuKr/view?usp=drive_link" }
                ]
            },
            "urdu": {
                name: "📝 Urdu",
                resources: [
                    { tag: "[PDF]", title: "Matric Urdu Model Paper – Federal Board", desc: "9th grade model papers for Matric Urdu from the Federal board.", url: "https://drive.google.com/file/d/1iDviYuFpZ99FuWdaNIW7Ht29XiT6gU-v/view?usp=drive_link" }
                ]
            },
            "islamiyat": {
                name: "🕌 Islamiyat",
                resources: [
                    { tag: "[PDF]", title: "Matric Islamiyat Model Paper – Federal Board", desc: "9th grade model paper for Matric Islamiyat from the Federal Board.", url: "https://drive.google.com/file/d/1d8qpyf2GSfnotsjRHzt3L-TRbAw1-RxM/view?usp=drive_link" }
                ]
            },
            "thq": {
                name: "📖 Tarjama ul Quran",
                resources: [
                    { tag: "[PDF]", title: "Matric Tarjama ul Quran Model Paper – Federal Board", desc: "9th grade model paper for Matric Tarjama ul Quran from the Federal Board.", url: "https://drive.google.com/file/d/1olIRxhzzBJN_LjtbEB3PABLijNUGpKcl/view?usp=drive_link" }
                ]
            }
        };

        function renderResources(key) {
            const sub = subjects[key];
            if (!sub) return;
            const container = document.getElementById('resourcesContainer');
            let html = `<div class="cat-header">&gt;&gt; ${sub.name}</div>`;
            sub.resources.forEach(r => {
                html += `
                    <div class="resource-row">
                        <span class="tag">${r.tag}</span>
                        <div>
                            <a href="${r.url}" target="_blank">${r.title}</a>
                            <span class="desc">${r.desc}</span>
                        </div>
                    </div>
                `;
            });
            html += `<div class="back-top"><a href="#top">[Back to Top]</a></div>`;
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('subjectSelect');
            renderResources(select.value);
            select.addEventListener('change', function() {
                renderResources(this.value);
            });
        });
    </script>
</body>
</html>
