                ]
            }
        };

        function renderResources(key) {
            const sub = subjects[key];
            if (!sub) return;
            const container = document.getElementById('resourcesContainer');
            let html = `<div class="cat-header">&gt;&gt; ${sub.name}</div>`;
            sub.resources.forEach(r => {
                html += `
                    <div class="resource-row">
                        <span class="tag">${r.tag}</span>
                        <div>
                            <a href="${r.url}" target="_blank">${r.title}</a>
                            <span class="desc">${r.desc}</span>
                        </div>
                    </div>
                `;
            });
            html += `<div class="back-top"><a href="#top">[Back to Top]</a></div>`;
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('subjectSelect');
            renderResources(select.value);
            select.addEventListener('change', function() {
                renderResources(this.value);
            });
        });
    </script>
