<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Intermediate – parhlobhai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="topbar">
        <div class="container">
            <span><b>parhlobhai&nbsp;&nbsp;</b></span>
            <button class="dark-toggle" id="darkToggleBtn" onclick="toggleDarkMode()">🌙 Dark</button>
        </div>
    </div>

    <div class="navbar">
        <div class="container">
            <a href="index.html">Home</a>
            <a href="o-levels.html">O Levels</a>
            <a href="igcse.html">IGCSE</a>
            <a href="a-levels.html">A Levels</a>
            <a href="matriculation.html">Matriculation</a>
            <a href="intermediate.html">Intermediate</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="container">

        <div class="title-block">
            <h1>Intermediate</h1>
            <div class="sub">FSc Pre-Medical, Pre-Engineering, and ICS resources for Class 11 & 12 students.</div>
        </div>

        <div class="dropdown-container">
            <label for="subjectSelect" class="dropdown-label">Select a subject:</label>
            <select id="subjectSelect" class="native-select">
                <option value="mathematics">📐 Mathematics</option>
                <option value="physics">⚡ Physics</option>
                <option value="chemistry">🧪 Chemistry</option>
                <option value="biology">🔬 Biology</option>
                <option value="english">📖 English</option>
            </select>
        </div>

        <div id="resourcesContainer"></div>

        <hr class="hr-90s">

        <div class="footer">
            &copy; 2026 parhlobhai &nbsp;|&nbsp; <a href="about.html">About</a> &nbsp;|&nbsp; <a href="contact.html">Contact</a>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        const subjects = {
            "mathematics": {
                name: "📐 Mathematics",
                resources: [
                    { tag: "[FOLDER]", title: "Mathematics Resources for 11th/12th", desc: "A drive consisting of resources for mathematics for 11th and 12th graders", url: "https://drive.google.com/drive/folders/1uD3oNwl7kIsEgV3fwEkv8ms0ZVk6pbn4?usp=drive_link" }
                ]
            },
            "physics": {
                name: "⚡ Physics",
                resources: [
                    { tag: "[FOLDER]", title: "Physics resources for 11th/12th", desc: "A drive consisting of resources for physics for 11th and 12th graders", url: "https://drive.google.com/drive/folders/1eLhSlxGHNkaTTx8DYaWpmrbojjkapxRa?usp=drive_link" }
                ]
            },
            "chemistry": {
                name: "🧪 Chemistry",
                resources: [
                    { tag: "[FOLDER]", title: "Chemistry resources for 11/12th", desc: "A drive consisting of resources for chemistry for 11th and 12th graders", url: "https://drive.google.com/drive/folders/17_xS9qtpv54I4-_yiH51wH0PxWQVCpdO?usp=drive_link" }
                ]
            },
            "biology": {
                name: "🔬 Biology",
                resources: [
                    { tag: "[FOLDER]", title: "Biology resources for 11th/12th", desc: "A drive consisting of resources for biology for 11th and 12th graders", url: "https://drive.google.com/drive/folders/1ssPLP2z4ekfZn4dcCSAg1hYU3-eH4j-O?usp=drive_link" }
                ]
            },
            "english": {
                name: "📖 English",
                resources: [
                    { tag: "[FOLDER]", title: "English resources for 11th/12th", desc: "A drive consisting of resources for English for 11th and 12th graders", url: "https://drive.google.com/drive/folders/1peAgB2cBbfexJTg1a1S1pvyZP7raGqBK?usp=drive_link" }
                ]
            }
        };

        function renderResources(key) {
            const sub = subjects[key];
            if (!sub) return;
            const container = document.getElementById('resourcesContainer');
            let html = `<div class="cat-header">&gt;&gt; ${sub.name}</div>`;
            sub.resources.forEach(r => {
                html += `
                    <div class="resource-row">
                        <span class="tag">${r.tag}</span>
                        <div>
                            <a href="${r.url}" target="_blank">${r.title}</a>
                            <span class="desc">${r.desc}</span>
                        </div>
                    </div>
                `;
            });
            html += `<div class="back-top"><a href="#top">[Back to Top]</a></div>`;
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('subjectSelect');
            renderResources(select.value);
            select.addEventListener('change', function() {
                renderResources(this.value);
            });
        });
    </script>
</body>
</html>
